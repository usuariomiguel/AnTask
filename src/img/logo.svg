<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90">
  <defs>

    <!-- Brand gradient: indigo → violet (horizontal, covers wordmark region) -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="55%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Gradient covering just "task" letters (x ≈ 175–265) -->
    <linearGradient id="textAccent"
      x1="175" y1="0" x2="265" y2="0"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Hex body fill -->
    <linearGradient id="hexBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1b4b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0f0e1c" stop-opacity="0.90"/>
    </linearGradient>

    <!-- Background card -->
    <linearGradient id="bgCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#12111f"/>
      <stop offset="100%" stop-color="#09090d"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="blur"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.72" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient blob -->
    <filter id="blob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

  </defs>

  <!-- ── Card background ───────────────────────────────────── -->
  <rect width="360" height="90" rx="16" fill="url(#bgCard)"/>

  <!-- ── Ambient glow (icon area) ─────────────────────────── -->
  <ellipse cx="45" cy="46" rx="22" ry="19"
    fill="#4f46e5" opacity="0.28" filter="url(#blob)"/>

  <!-- ── Hex icon: center (45,46), R=33 ────────────────────── -->
  <!-- pointy-top vertices -->
  <!-- V0 top:         (45, 13)                              -->
  <!-- V1 top-right:   (45+28.6, 46-16.5) = (73.6, 29.5)   -->
  <!-- V2 bottom-right:(73.6, 62.5)                          -->
  <!-- V3 bottom:      (45, 79)                              -->
  <!-- V4 bottom-left: (16.4, 62.5)                          -->
  <!-- V5 top-left:    (16.4, 29.5)                          -->

  <!-- Hex fill -->
  <polygon
    points="45,13 73.6,29.5 73.6,62.5 45,79 16.4,62.5 16.4,29.5"
    fill="url(#hexBody)"/>

  <!-- Hex ring (glowing) -->
  <polygon
    points="45,13 73.6,29.5 73.6,62.5 45,79 16.4,62.5 16.4,29.5"
    fill="none" stroke="url(#brand)" stroke-width="1.6"
    filter="url(#glow)"/>

  <!-- Vertex dots -->
  <circle cx="45"  cy="13"   r="2.0" fill="url(#brand)" filter="url(#glow)"/>
  <circle cx="73.6" cy="29.5" r="2.0" fill="url(#brand)" filter="url(#glow)"/>
  <circle cx="73.6" cy="62.5" r="2.0" fill="url(#brand)" filter="url(#glow)"/>
  <circle cx="45"  cy="79"   r="2.0" fill="url(#brand)" filter="url(#glow)"/>
  <circle cx="16.4" cy="62.5" r="2.0" fill="url(#brand)" filter="url(#glow)"/>
  <circle cx="16.4" cy="29.5" r="2.0" fill="url(#brand)" filter="url(#glow)"/>

  <!-- Inner hex ring (depth) — center 45,46, R=21 -->
  <polygon
    points="45,25 63.2,35.5 63.2,56.5 45,67 26.8,56.5 26.8,35.5"
    fill="none" stroke="url(#brand)" stroke-width="0.65" opacity="0.28"/>

  <!-- Checkmark -->
  <path d="M 29,47 L 40,59 L 62,33"
    fill="none" stroke="url(#brand)"
    stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- ── Divider ────────────────────────────────────────────── -->
  <line x1="87" y1="22" x2="87" y2="68"
    stroke="#ffffff" stroke-width="0.8" opacity="0.07"/>

  <!-- ── Wordmark ───────────────────────────────────────────── -->
  <!-- "Anso" in near-white, "task" in brand gradient -->
  <text
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="34" font-weight="700" letter-spacing="-1"
    x="101" y="54">
    <tspan fill="#f1f0f9">Anso</tspan><tspan fill="url(#textAccent)">task</tspan>
  </text>

  <!-- ── Tagline ────────────────────────────────────────────── -->
  <text x="103" y="70"
    font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="9.5" font-weight="400" letter-spacing="2.2"
    fill="#4c495f">// proyectos · tareas · notas</text>

</svg>
