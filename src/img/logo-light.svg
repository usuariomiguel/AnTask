<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 155 44">
  <defs>
    <linearGradient id="brand" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b09dfc"/>
      <stop offset="50%"  stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#5b3de8"/>
    </linearGradient>
    <linearGradient id="tg" x1="54" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5b3de8"/>
      <stop offset="100%" stop-color="#8b7cf6"/>
    </linearGradient>
  </defs>

  <!-- Flat-top hexagon (hollow outline), cx=22 cy=22 R=15.5 -->
  <polygon
    points="37.5,22 29.75,8.6 14.25,8.6 6.5,22 14.25,35.4 29.75,35.4"
    fill="none"
    stroke="url(#brand)"
    stroke-width="2.7"
    stroke-linejoin="round"/>

  <!-- Checkmark — stays inside the hex -->
  <path d="M 11.5,23.5 L 19,31 L 31,14.5"
    fill="none"
    stroke="url(#brand)"
    stroke-width="3.1"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Wordmark: "an" dark charcoal, "task" in brand gradient -->
  <text x="48" y="29"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1a1730">an</tspan><tspan fill="url(#tg)">task</tspan>
  </text>
</svg>
