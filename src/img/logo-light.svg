<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 155 44">
  <defs>
    <linearGradient id="ant-l" gradientUnits="userSpaceOnUse" x1="19" y1="4" x2="19" y2="42">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="45%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="tg-l" gradientUnits="userSpaceOnUse" x1="67" y1="0" x2="112" y2="0">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- ── LEGS (behind body) ──────────────────────────── -->
  <polyline points="13,23 8,19 6,22"   fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="13,26 7,26 5,30"   fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="13,30 8,33 7,36"   fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="25,23 30,19 32,22" fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="25,26 31,26 33,30" fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="25,30 30,33 31,36" fill="none" stroke="url(#ant-l)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── ABDOMEN ─────────────────────────────────────── -->
  <ellipse cx="19" cy="35" rx="8" ry="6" fill="url(#ant-l)"/>

  <!-- ── PETIOLE (waist) ────────────────────────────── -->
  <ellipse cx="19" cy="29.5" rx="2.2" ry="1.8" fill="url(#ant-l)"/>

  <!-- ── THORAX ─────────────────────────────────────── -->
  <ellipse cx="19" cy="24.5" rx="5.5" ry="5" fill="url(#ant-l)"/>

  <!-- ── CHECKMARK on thorax ───────────────────────── -->
  <path d="M 14.5,25 L 17.5,28.5 L 24,21"
    fill="none" stroke="rgba(255,255,255,0.97)"
    stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── HEAD ───────────────────────────────────────── -->
  <ellipse cx="19" cy="15.5" rx="4.5" ry="4" fill="url(#ant-l)"/>

  <!-- ── EYES ───────────────────────────────────────── -->
  <circle cx="17.2" cy="14.8" r="1.25" fill="white"/>
  <circle cx="20.8" cy="14.8" r="1.25" fill="white"/>

  <!-- ── ANTENNAE ───────────────────────────────────── -->
  <path d="M 17.5,12 Q 14,7.5 11,5"
    fill="none" stroke="url(#ant-l)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="11" cy="5" r="1.6" fill="url(#ant-l)"/>
  <path d="M 20.5,12 Q 24,7.5 27,5"
    fill="none" stroke="url(#ant-l)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="27" cy="5" r="1.6" fill="url(#ant-l)"/>

  <!-- ── WORDMARK ───────────────────────────────────── -->
  <text x="47" y="30"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18">
    <tspan font-weight="300" fill="rgba(26,23,48,0.50)" letter-spacing="-0.4">an</tspan><tspan font-weight="800" fill="url(#tg-l)" letter-spacing="-0.5">task</tspan>
  </text>
</svg>
