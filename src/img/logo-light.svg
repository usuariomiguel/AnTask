<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 38">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="55%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tg" x1="90" y1="0" x2="132" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ede9fe" stop-opacity="0.80"/>
      <stop offset="100%"  stop-color="#ddd6fe" stop-opacity="0.60"/>
    </linearGradient>
    <filter id="g" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.8" result="b"/>
      <feFlood flood-color="#4f46e5" flood-opacity="0.40" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blob" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- ambient glow (lighter) -->
  <ellipse cx="19" cy="20" rx="13" ry="11" fill="#818cf8" opacity="0.14" filter="url(#blob)"/>

  <!-- hex fill -->
  <polygon points="19,3 32.9,11 32.9,27 19,35 5.1,27 5.1,11" fill="url(#hexFill)"/>

  <!-- hex ring -->
  <polygon points="19,3 32.9,11 32.9,27 19,35 5.1,27 5.1,11"
    fill="none" stroke="url(#brand)" stroke-width="1.4" filter="url(#g)"/>

  <!-- vertex dots -->
  <circle cx="19"   cy="3"  r="1.7" fill="url(#brand)" filter="url(#g)"/>
  <circle cx="32.9" cy="11" r="1.7" fill="url(#brand)" filter="url(#g)"/>
  <circle cx="32.9" cy="27" r="1.7" fill="url(#brand)" filter="url(#g)"/>
  <circle cx="19"   cy="35" r="1.7" fill="url(#brand)" filter="url(#g)"/>
  <circle cx="5.1"  cy="27" r="1.7" fill="url(#brand)" filter="url(#g)"/>
  <circle cx="5.1"  cy="11" r="1.7" fill="url(#brand)" filter="url(#g)"/>

  <!-- inner hex ring -->
  <polygon points="19,8.5 28.1,13.75 28.1,24.25 19,29.5 9.9,24.25 9.9,13.75"
    fill="none" stroke="url(#brand)" stroke-width="0.55" opacity="0.35"/>

  <!-- checkmark -->
  <path d="M 10.5,20 L 17,27 L 27.5,12"
    fill="none" stroke="url(#brand)" stroke-width="3.8"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#g)"/>

  <!-- divider -->
  <line x1="43" y1="7" x2="43" y2="31" stroke="#000000" stroke-width="0.7" opacity="0.08"/>

  <!-- wordmark -->
  <text x="51" y="26"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="17" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#18172a">Anso</tspan><tspan fill="url(#tg)">task</tspan>
  </text>
</svg>
