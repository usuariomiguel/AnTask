<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 44">
  <defs>
    <linearGradient id="ad" x1="3" y1="2" x2="37" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="od" x1="2" y1="15" x2="39" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Orbital ring — back arc (behind A) -->
  <path d="M 38.5,14.5 A 20,7 -22 0,0 1.5,29.5"
        fill="none" stroke="url(#od)" stroke-width="3"
        stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- A mark -->
  <path d="M 3,42 L 20,2 L 37,42"
        fill="none" stroke="url(#ad)" stroke-width="5.8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 10,25 L 30,25"
        fill="none" stroke="url(#ad)" stroke-width="5.8"
        stroke-linecap="round"/>

  <!-- Orbital ring — front arc (in front of A) -->
  <path d="M 1.5,29.5 A 20,7 -22 0,1 38.5,14.5"
        fill="none" stroke="url(#od)" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="46" y="31"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="25" font-weight="600"
        fill="rgba(241,240,249,0.92)">Antask</text>
</svg>
