<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#09090d"/>
    </linearGradient>
    <linearGradient id="ag2" gradientUnits="userSpaceOnUse" x1="50" y1="8" x2="50" y2="92">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="45%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.60" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg-g)"/>

  <!-- Ambient glow blob -->
  <ellipse cx="50" cy="50" rx="30" ry="26" fill="#4f46e5" opacity="0.15"
    style="filter: blur(14px);"/>

  <!-- ── LEGS ─────────────────────────────────────── -->
  <polyline points="38,42 26,33 19,40" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="38,47 22,45 13,53" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="38,53 25,64 19,72" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="62,42 74,33 81,40" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="62,47 78,45 87,53" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="62,53 75,64 81,72" fill="none" stroke="url(#ag2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── BODY ──────────────────────────────────────── -->
  <ellipse cx="50" cy="79" rx="20" ry="15" fill="url(#ag2)" filter="url(#glow2)"/>
  <ellipse cx="50" cy="62" rx="5.5" ry="4.5" fill="url(#ag2)"/>
  <ellipse cx="50" cy="47" rx="13" ry="13" fill="url(#ag2)" filter="url(#glow2)"/>

  <!-- ── CHECKMARK ──────────────────────────────────── -->
  <path d="M 39.5,47 L 47,56 L 62,37"
    fill="none" stroke="rgba(255,255,255,0.96)"
    stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── HEAD ────────────────────────────────────────── -->
  <ellipse cx="50" cy="23" rx="12" ry="10" fill="url(#ag2)" filter="url(#glow2)"/>

  <!-- ── EYES ────────────────────────────────────────── -->
  <circle cx="45" cy="22" r="2.8" fill="white"/>
  <circle cx="55" cy="22" r="2.8" fill="white"/>

  <!-- ── ANTENNAE ─────────────────────────────────────── -->
  <path d="M 46,14 Q 36,9 27,8"
    fill="none" stroke="url(#ag2)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="27" cy="8" r="3.8" fill="url(#ag2)"/>
  <path d="M 54,14 Q 64,9 73,8"
    fill="none" stroke="url(#ag2)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="73" cy="8" r="3.8" fill="url(#ag2)"/>
</svg>
