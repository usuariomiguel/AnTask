<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0b1a"/>
    </linearGradient>
    <linearGradient id="ag3" x1="18" y1="9" x2="82" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="og3" x1="10" y1="34" x2="91" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg-g)"/>

  <!-- Ambient glow blob -->
  <ellipse cx="50" cy="46" rx="28" ry="22" fill="#5b21b6" opacity="0.20"
           style="filter: blur(16px);"/>

  <!-- Orbital ring — back arc (behind A) -->
  <path d="M 90.8,33.5 A 44,15 -22 0,0 9.2,66.5"
        fill="none" stroke="url(#og3)" stroke-width="5.5"
        stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- A mark -->
  <path d="M 18,83 L 50,9 L 82,83"
        fill="none" stroke="url(#ag3)" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow3)"/>
  <path d="M 30,55 L 70,55"
        fill="none" stroke="url(#ag3)" stroke-width="12"
        stroke-linecap="round"
        filter="url(#glow3)"/>

  <!-- Orbital ring — front arc (in front of A) -->
  <path d="M 9.2,66.5 A 44,15 -22 0,1 90.8,33.5"
        fill="none" stroke="url(#og3)" stroke-width="5.5"
        stroke-linecap="round"/>
</svg>
