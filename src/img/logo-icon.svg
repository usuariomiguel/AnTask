<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="50" y1="4" x2="50" y2="97">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="45%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- ── LEGS ───────────────────────────────────────── -->
  <polyline points="36,40 22,30 14,37" fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="36,44 18,42 8,51"  fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="36,51 22,63 15,71" fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="64,40 78,30 86,37" fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="64,44 82,42 92,51" fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="64,51 78,63 85,71" fill="none" stroke="url(#ag)" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── ABDOMEN ────────────────────────────────────── -->
  <ellipse cx="50" cy="80" rx="23" ry="17" fill="url(#ag)"/>

  <!-- ── PETIOLE ────────────────────────────────────── -->
  <ellipse cx="50" cy="61" rx="6"  ry="5"  fill="url(#ag)"/>

  <!-- ── THORAX ─────────────────────────────────────── -->
  <ellipse cx="50" cy="44" rx="14" ry="14" fill="url(#ag)"/>

  <!-- ── CHECKMARK ──────────────────────────────────── -->
  <path d="M 38,44 L 46,53 L 63,34"
    fill="none" stroke="rgba(255,255,255,0.95)"
    stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── HEAD ───────────────────────────────────────── -->
