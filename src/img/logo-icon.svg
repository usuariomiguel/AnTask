  <!-- ── EYES ───────────────────────────────────────── -->
  <circle cx="44" cy="18" r="3"   fill="white"/>
  <circle cx="56" cy="18" r="3"   fill="white"/>

  <!-- ── ANTENNAE ───────────────────────────────────── -->
  <path d="M 45,10 Q 33,5 22,4"
    fill="none" stroke="url(#ag)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="22" cy="4"  r="4"   fill="url(#ag)"/>
  <path d="M 55,10 Q 67,5 78,4"
