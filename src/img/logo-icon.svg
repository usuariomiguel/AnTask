<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brand" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b09dfc"/>
      <stop offset="50%"  stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#5b3de8"/>
    </linearGradient>
  </defs>

  <!-- Flat-top hexagon (hollow outline), cx=50 cy=50 R=42 -->
  <polygon
    points="92,50 71,13.6 29,13.6 8,50 29,86.4 71,86.4"
    fill="none"
    stroke="url(#brand)"
    stroke-width="5.5"
    stroke-linejoin="round"/>

  <!-- Checkmark — stays inside the hex -->
  <path d="M 22,53 L 41,70 L 75,28"
    fill="none"
    stroke="url(#brand)"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
