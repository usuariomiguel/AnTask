<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ag" x1="18" y1="9" x2="82" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="og" x1="10" y1="34" x2="91" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Orbital ring — back arc (upper half, behind the A) -->
  <path d="M 90.8,33.5 A 44,15 -22 0,0 9.2,66.5"
        fill="none" stroke="url(#og)" stroke-width="5.5"
        stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- A mark -->
  <path d="M 18,83 L 50,9 L 82,83"
        fill="none" stroke="url(#ag)" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 30,55 L 70,55"
        fill="none" stroke="url(#ag)" stroke-width="12"
        stroke-linecap="round"/>

  <!-- Orbital ring — front arc (lower half, in front of A) -->
  <path d="M 9.2,66.5 A 44,15 -22 0,1 90.8,33.5"
        fill="none" stroke="url(#og)" stroke-width="5.5"
        stroke-linecap="round"/>
</svg>
