name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build ──────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Unit tests ────────────────────────────────────────────
      - name: Unit tests (Vitest)
        run: npm test

      # ── Security audit ────────────────────────────────────────
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true   # informa pero no bloquea el merge

      # ── E2E ───────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (Playwright)
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
